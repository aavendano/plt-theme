<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../playlovetoys.css">
<style>
  body{margin:0;padding:24px;font-family:var(--plt-font-body);background:var(--plt-paper)}
  .grp{margin-bottom:18px}
  .grp h4{margin:0 0 10px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--plt-text-muted);font-weight:700}
  .b-buttons{gap:8px}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, Tag, Tags, Box } = window.PlayLoveToysDesignSystem_88998d;
  function Demo() {
    return (
      <>
        <div className="grp">
          <h4>Buttons</h4>
          <div className="b-buttons">
            <Button color="link">Add to cart</Button>
            <Button color="primary">Wishlist</Button>
            <Button color="link" variant="outlined">Outlined</Button>
            <Button color="primary" variant="light">Light</Button>
            <Button color="primary" variant="ghost">Ghost</Button>
            <Button color="link" rounded>Shop now</Button>
            <Button color="info" loading>Loading</Button>
            <Button disabled>Disabled</Button>
          </div>
        </div>
        <div className="grp">
          <h4>Sizes</h4>
          <div className="b-buttons">
            <Button color="link" size="small">Small</Button>
            <Button color="link">Default</Button>
            <Button color="link" size="medium">Medium</Button>
            <Button color="link" size="large">Large</Button>
          </div>
        </div>
        <div className="grp">
          <h4>Tags</h4>
          <div className="b-buttons" style={{alignItems:'center'}}>
            <Tag color="link">New</Tag>
            <Tag color="danger">-30%</Tag>
            <Tag color="success" light>In stock</Tag>
            <Tag color="warning" light>Low stock</Tag>
            <Tag color="primary" light rounded>Waterproof</Tag>
            <Tags addons><Tag color="dark">Size</Tag><Tag color="link">L</Tag></Tags>
          </div>
        </div>
        <div className="grp" style={{marginBottom:0}}>
          <h4>Box</h4>
          <Box>
            <p className="b-title b-is-5" style={{marginBottom:'.4rem'}}>Discreet shipping</p>
            <p style={{margin:'0 0 .8rem',color:'var(--plt-text)'}}>Plain packaging — no branding on the box, ever.</p>
            <Button color="link" size="small">Learn more</Button>
          </Box>
        </div>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
