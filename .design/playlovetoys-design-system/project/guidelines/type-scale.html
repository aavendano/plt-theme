<!-- @dsCard group="Type" viewport="700x300" name="Headings & body — Roboto Condensed" subtitle="The working UI scale (matches live storefront)" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;font-family:var(--plt-font-body);background:#fff;color:var(--plt-text)}
  .r{display:flex;align-items:baseline;gap:14px;padding:6px 0;border-bottom:1px solid var(--plt-line)}
  .r:last-child{border:none}
  .r .t{color:var(--plt-text-strong);font-weight:700}
  .r .s{margin-left:auto;font-size:11px;color:var(--plt-text-muted)}
  .body{font-size:15px;font-weight:400;line-height:1.6;color:var(--plt-text)}
</style>
</head>
<body>
  <div class="r"><span class="t" style="font-size:34px">Best Sellers</span><span class="s">H1 · 32–60 · 700</span></div>
  <div class="r"><span class="t" style="font-size:24px">Rabbit Vibrators</span><span class="s">H3 · 24 · 700</span></div>
  <div class="r"><span class="t" style="font-size:18px">Add to cart</span><span class="s">UI · 16–18 · 600</span></div>
  <div class="r"><span class="body">Body copy stays warm and plain-spoken. Roboto Condensed keeps long descriptions tight without feeling cramped.</span></div>
</body>
</html>
