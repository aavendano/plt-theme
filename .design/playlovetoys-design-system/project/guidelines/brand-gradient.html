<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;font-family:var(--plt-font-body);background:#fff}
  .band{height:96px;border-radius:var(--plt-radius-lg);background:var(--plt-gradient);display:flex;align-items:center;padding:0 24px}
  .band span{font-family:var(--plt-font-display);color:#fff;font-weight:700;font-size:26px}
  .stops{display:flex;gap:22px;margin-top:12px;font-size:11.5px;color:var(--plt-text-muted);letter-spacing:.03em}
  .stops b{color:var(--plt-text-strong)}
</style>
</head>
<body>
  <div class="band"><span>Play more.</span></div>
  <div class="stops">
    <div><b>#231F20</b> ink · 0%</div>
    <div><b>#533278</b> purple · 50%</div>
    <div><b>#F4436C</b> pink · 100%</div>
    <div>115° linear</div>
  </div>
</body>
</html>
