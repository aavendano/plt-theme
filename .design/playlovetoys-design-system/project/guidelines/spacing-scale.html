<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing scale" subtitle="4px base · 1–8 steps" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;font-family:var(--plt-font-body);background:#fff}
  .row{display:flex;align-items:flex-end;gap:16px}
  .col{text-align:center}
  .bar{background:var(--plt-pink-soft);border:1px solid var(--plt-pink);border-radius:var(--plt-radius-xs)}
  .nm{font-size:11px;color:var(--plt-text-strong);font-weight:700;margin-top:7px}
  .px{font-size:10px;color:var(--plt-text-muted)}
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="bar" style="width:4px;height:4px"></div><div class="nm">1</div><div class="px">4</div></div>
    <div class="col"><div class="bar" style="width:8px;height:8px"></div><div class="nm">2</div><div class="px">8</div></div>
    <div class="col"><div class="bar" style="width:12px;height:12px"></div><div class="nm">3</div><div class="px">12</div></div>
    <div class="col"><div class="bar" style="width:16px;height:16px"></div><div class="nm">4</div><div class="px">16</div></div>
    <div class="col"><div class="bar" style="width:24px;height:24px"></div><div class="nm">5</div><div class="px">24</div></div>
    <div class="col"><div class="bar" style="width:32px;height:32px"></div><div class="nm">6</div><div class="px">32</div></div>
    <div class="col"><div class="bar" style="width:48px;height:48px"></div><div class="nm">7</div><div class="px">48</div></div>
    <div class="col"><div class="bar" style="width:72px;height:72px"></div><div class="nm">8</div><div class="px">72</div></div>
  </div>
</body>
</html>
