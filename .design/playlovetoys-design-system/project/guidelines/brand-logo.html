<!-- @dsCard group="Brand" viewport="700x260" name="Logo" subtitle="Devil-heart mark + wordmark — on light and on brand" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;font-family:var(--plt-font-body);background:#fff}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .panel{border-radius:var(--plt-radius-lg);border:1px solid var(--plt-line);display:flex;align-items:center;justify-content:center;height:200px;padding:24px}
  .panel.dark{border:none;background:var(--plt-gradient)}
  .panel img{max-width:100%;max-height:150px}
  .panel.dark img{filter:brightness(0) invert(1)}
</style>
</head>
<body>
  <div class="grid">
    <div class="panel"><img src="../assets/logo/Logo-PlayLoveToys-3by2-800x534.png" alt="PlayLoveToys logo"></div>
    <div class="panel dark"><img src="../assets/logo/Logo-PlayLoveToys-3by2-800x534.png" alt="PlayLoveToys logo on brand gradient"></div>
  </div>
</body>
</html>
