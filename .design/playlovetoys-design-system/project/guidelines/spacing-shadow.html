<!-- @dsCard group="Spacing" viewport="700x190" name="Elevation & shadows" subtitle="Soft cool-tinted shadows + pink CTA glow" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:26px;font-family:var(--plt-font-body);background:#fff}
  .row{display:flex;gap:26px;flex-wrap:wrap}
  .col{text-align:center}
  .box{width:120px;height:74px;background:#fff;border-radius:var(--plt-radius-lg)}
  .nm{font-size:11.5px;color:var(--plt-text-strong);font-weight:700;margin-top:12px}
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="box" style="box-shadow:var(--plt-shadow-sm)"></div><div class="nm">sm</div></div>
    <div class="col"><div class="box" style="box-shadow:var(--plt-shadow)"></div><div class="nm">base</div></div>
    <div class="col"><div class="box" style="box-shadow:var(--plt-shadow-md)"></div><div class="nm">md</div></div>
    <div class="col"><div class="box" style="box-shadow:var(--plt-shadow-lg)"></div><div class="nm">lg</div></div>
    <div class="col"><div class="box" style="box-shadow:var(--plt-shadow-pink)"></div><div class="nm">pink glow</div></div>
  </div>
</body>
</html>
