<!-- @dsCard group="Colors" viewport="700x200" name="Neutrals" subtitle="Cool-grey surfaces, lines & ink for text" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;font-family:var(--plt-font-body);background:#fff}
  .row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
  .sw{text-align:left}
  .chip{height:72px;border-radius:var(--plt-radius);border:1px solid var(--plt-line)}
  .nm{font-weight:700;font-size:12.5px;color:var(--plt-text-strong);margin-top:7px}
  .hx{font-size:11px;color:var(--plt-text-muted);letter-spacing:.03em}
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--plt-white)"></div><div class="nm">White</div><div class="hx">#FFFFFF</div></div>
    <div class="sw"><div class="chip" style="background:var(--plt-paper)"></div><div class="nm">Paper</div><div class="hx">#FAFAFB</div></div>
    <div class="sw"><div class="chip" style="background:var(--plt-cloud)"></div><div class="nm">Cloud</div><div class="hx">#F4F4F6</div></div>
    <div class="sw"><div class="chip" style="background:var(--plt-line-strong)"></div><div class="nm">Line</div><div class="hx">#CFCFD6</div></div>
    <div class="sw"><div class="chip" style="background:var(--plt-slate)"></div><div class="nm">Slate</div><div class="hx">#6C6F7A</div></div>
    <div class="sw"><div class="chip" style="background:var(--plt-charcoal)"></div><div class="nm">Charcoal</div><div class="hx">#2E2B35</div></div>
  </div>
</body>
</html>
