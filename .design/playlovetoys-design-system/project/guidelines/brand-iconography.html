<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;font-family:var(--plt-font-body);background:#fff}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .ic{width:96px;height:96px;border:1px solid var(--plt-line);border-radius:var(--plt-radius-md);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
  .ic img{width:26px;height:26px}
  .ic span{font-size:11px;color:var(--plt-text-muted)}
</style>
</head>
<body>
  <div class="row">
    <div class="ic"><img src="../assets/icons/icon-person.svg" alt=""><span>person</span></div>
    <div class="ic"><img src="../assets/icons/icon-account.svg" alt=""><span>account</span></div>
    <div class="ic"><img src="../assets/icons/icon-cart.svg" alt=""><span>cart</span></div>
    <div class="ic"><img src="../assets/icons/icon-shopping-bag.svg" alt=""><span>bag</span></div>
    <div class="ic"><img src="../assets/icons/icon-filter.svg" alt=""><span>filter</span></div>
    <div class="ic"><img src="../assets/icons/icon-caret.svg" alt=""><span>caret</span></div>
  </div>
</body>
</html>
