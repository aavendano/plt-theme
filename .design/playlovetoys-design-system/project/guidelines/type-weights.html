<!-- @dsCard group="Type" viewport="700x150" name="Weights & emphasis" subtitle="Roboto Condensed 300–800 + transforms" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;font-family:var(--plt-font-body);background:#fff;color:var(--plt-text-strong)}
  .row{display:flex;gap:26px;flex-wrap:wrap;align-items:baseline}
  .row span{font-size:24px}
  .row em{display:block;font-size:10.5px;color:var(--plt-text-muted);font-style:normal;margin-top:2px}
  .tf{margin-top:18px;display:flex;gap:24px;font-size:14px;color:var(--plt-text)}
</style>
</head>
<body>
  <div class="row">
    <div><span style="font-weight:300">Light</span><em>300</em></div>
    <div><span style="font-weight:400">Regular</span><em>400</em></div>
    <div><span style="font-weight:500">Medium</span><em>500</em></div>
    <div><span style="font-weight:600">Semibold</span><em>600</em></div>
    <div><span style="font-weight:700">Bold</span><em>700</em></div>
    <div><span style="font-weight:800">Extrabold</span><em>800</em></div>
  </div>
  <div class="tf">
    <span style="text-transform:uppercase;letter-spacing:.16em;font-weight:600">Overline</span>
    <span style="font-style:italic">Italic accent</span>
    <span style="text-decoration:underline;text-decoration-color:var(--plt-pink)">Linked</span>
  </div>
</body>
</html>
