<!-- @dsCard group="Spacing" viewport="700x170" name="Corner radius" subtitle="Sharp badges → pill chips" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;font-family:var(--plt-font-body);background:#fff}
  .row{display:flex;gap:16px;flex-wrap:wrap}
  .col{text-align:center}
  .box{width:74px;height:64px;background:var(--plt-purple-soft);border:1.5px solid var(--plt-purple)}
  .nm{font-size:11.5px;color:var(--plt-text-strong);font-weight:700;margin-top:7px}
  .px{font-size:10px;color:var(--plt-text-muted)}
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="box" style="border-radius:var(--plt-radius-xs)"></div><div class="nm">xs</div><div class="px">2px · badges</div></div>
    <div class="col"><div class="box" style="border-radius:var(--plt-radius-sm)"></div><div class="nm">sm</div><div class="px">4px · inputs</div></div>
    <div class="col"><div class="box" style="border-radius:var(--plt-radius)"></div><div class="nm">base</div><div class="px">6px · buttons</div></div>
    <div class="col"><div class="box" style="border-radius:var(--plt-radius-lg)"></div><div class="nm">lg</div><div class="px">12px · cards</div></div>
    <div class="col"><div class="box" style="border-radius:var(--plt-radius-xl)"></div><div class="nm">xl</div><div class="px">20px · panels</div></div>
    <div class="col"><div class="box" style="border-radius:var(--plt-radius-pill)"></div><div class="nm">pill</div><div class="px">chips</div></div>
  </div>
</body>
</html>
